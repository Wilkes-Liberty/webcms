# Development service container overrides
#
# Loaded via $settings['container_yamls'] in settings.local.php for local
# development environments (DDEV, Docker dev stack).
#
# DO NOT load this in production or staging — use production.services.yml there.
#
# To activate, add this to your settings.local.php:
#   $settings['container_yamls'][] = DRUPAL_ROOT . '/sites/development.services.yml';
#
parameters:
  # ── Twig debugging ────────────────────────────────────────────────────────
  # Adds HTML comments to templates showing which template files are active.
  # Also enables auto-reload so Twig template changes take effect immediately.
  twig.config:
    debug: true
    auto_reload: true
    cache: false

  # ── CORS for local development ────────────────────────────────────────────
  # Allow all local origins: Next.js dev server (3000), DDEV, direct Docker.
  # supportsCredentials: false allows '*' wildcard.
  cors.config:
    enabled: true
    allowedOrigins:
      - 'http://localhost:3000'
      - 'http://localhost:3001'
      - 'https://wilkesliberty.ddev.site'
      - 'http://wilkesliberty.ddev.site'
      - 'http://nextjs:3000'
    allowedHeaders:
      - '*'
    allowedMethods:
      - 'GET'
      - 'POST'
      - 'PUT'
      - 'PATCH'
      - 'DELETE'
      - 'OPTIONS'
    exposedHeaders: false
    maxAge: 0
    supportsCredentials: false

services:
  # ── Null cache backends ───────────────────────────────────────────────────
  # Disable caching during development so changes are always reflected.
  # Activate in settings.local.php with:
  #   $settings['cache']['bins']['render'] = 'cache.backend.null';
  #   $settings['cache']['bins']['dynamic_page_cache'] = 'cache.backend.null';
  #   $settings['cache']['bins']['page'] = 'cache.backend.null';
  cache.backend.null:
    class: Drupal\Core\Cache\NullBackendFactory
