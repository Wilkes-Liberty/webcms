uuid: 4b555a99-7b80-4995-a42d-23b9038ee58e
langcode: en
status: true
dependencies: {  }
id: sign_in_with_keycloak
label: Keycloak
plugin: generic
settings:
  # client_id + client_secret are intentionally placeholders here.
  # The real per-environment values are injected at runtime by the $config[]
  # override block in web/sites/default/settings.php, which reads:
  #   DRUPAL_OIDC_CLIENT_ID     (drupal-prod / drupal-staging / drupal-local)
  #   DRUPAL_OIDC_CLIENT_SECRET (SOPS-encrypted, per environment)
  client_id: PLACEHOLDER_OVERRIDDEN_BY_ENV
  client_secret: ''
  iss_allowed_domains: wilkesliberty.com
  prompt: {  }
  issuer_url: 'https://auth.wilkesliberty.com/realms/wilkesliberty/'
  authorization_endpoint: 'https://auth.wilkesliberty.com/realms/wilkesliberty/protocol/openid-connect/auth'
  token_endpoint: 'https://auth.wilkesliberty.com/realms/wilkesliberty/protocol/openid-connect/token'
  userinfo_endpoint: 'https://auth.wilkesliberty.com/realms/wilkesliberty/protocol/openid-connect/userinfo'
  end_session_endpoint: 'https://auth.wilkesliberty.com/realms/wilkesliberty/protocol/openid-connect/logout'
  scopes:
    - openid
    - profile
    - email
    - groups
