title: Контакт
description: 'Основная веб-форма для связи по электронной почте.'
elements: |-
  name:
    '#type': textfield
    '#title': 'Name'
    '#required': true
    '#maxlength': 120
  email:
    '#type': email
    '#title': 'Email'
    '#required': true
  organization:
    '#type': textfield
    '#title': 'Organization'
    '#maxlength': 200
  subject:
    '#type': textfield
    '#title': 'Subject'
    '#required': true
    '#maxlength': 200
  message:
    '#type': textarea
    '#title': 'Message'
    '#required': true
    '#rows': 6
settings:
  confirmation_message: 'Ваше сообщение отправлено.'
handlers:
  email_confirmation:
    label: 'Подтверждение почтой'
  email_notification:
    label: 'Уведомления по email'
