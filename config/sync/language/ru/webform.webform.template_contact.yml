title: 'Связаться с нами'
elements: |-
  name:
    '#title': 'Your Name'
    '#type': textfield
    '#required': true
  email:
    '#title': 'Your Email'
    '#type': email
    '#required': true
  subject:
    '#title': Subject
    '#type': textfield
    '#required': true
  message:
    '#title': Message
    '#type': textarea
    '#required': true
  actions:
    '#type': webform_actions
    '#title': 'Submit button(s)'
    '#submit__label': 'Send message'
settings:
  confirmation_message: 'Ваше сообщение отправлено.'
handlers:
  email_confirmation:
    label: 'Подтверждение почтой'
  email_notification:
    label: 'Уведомления по email'
